{% extends 'base.html' %}
{% block title %}Login — SECONDS{% endblock %}
{% block content %}
<div style="min-height:82vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;">
  <div style="width:100%;max-width:420px;">
    <div class="card">
      <div class="card-body" style="padding:2.25rem;">
        <div style="text-align:center;margin-bottom:1.75rem;">
          {% include 'includes/logo_svg.html' with size="64" %}
          <h1 style="font-family:var(--font-serif);font-size:2rem;color:var(--slate);">Welcome Back</h1>
          <p style="font-size:1rem;color:var(--text-soft);margin-top:0.25rem;">Sign in to your SECONDS account</p>
        </div>
        <form method="post">
          {% csrf_token %}
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-input" placeholder="Enter your username" required autofocus/>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-input" placeholder="Enter your password" required/>
          </div>
          <button type="submit" class="btn btn-primary btn-lg btn-block" style="margin-top:0.5rem;">Log In</button>
        </form>
        <p class="text-center mt-2" style="font-size:1rem;color:var(--text-soft);">
          No account? <a href="{% url 'register' %}" style="color:var(--gold-dark);font-weight:700;">Register here</a>
        </p>
        <p class="text-center mt-1"><a href="{% url 'guest_home' %}" style="font-size:0.92rem;color:var(--text-soft);">← Browse as Guest</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
